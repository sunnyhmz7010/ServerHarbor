name: Bug report
description: Report a reproducible problem in ServerHarbor
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please provide enough detail to reproduce it.
  - type: input
    id: version
    attributes:
      label: Version
      description: ServerHarbor version or commit
      placeholder: v0.1.0 or commit hash
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Linux distribution, shell, and relevant tools
      placeholder: Ubuntu 22.04, bash 5.1, systemd enabled
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ./menu.sh
        2. Choose option 1
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

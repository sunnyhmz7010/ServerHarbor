name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      
      - name: Run ShellCheck
        run: shellcheck -e SC1091,SC2034 menu.sh common.sh bootstrap.sh probe.sh security.sh nodes.sh install.sh run.sh uninstall.sh || true
  
  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run bash syntax check
        run: |
          bash -n menu.sh
          bash -n common.sh
          bash -n bootstrap.sh
          bash -n probe.sh
          bash -n security.sh
          bash -n nodes.sh
          bash -n install.sh
          bash -n run.sh
          bash -n uninstall.sh
  
  test-install:
    name: Test Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Test install script syntax
        run: bash -n install.sh
      
      - name: Test run script syntax
        run: bash -n run.sh
